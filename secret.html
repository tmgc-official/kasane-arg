<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111009;
  color:#c0a888;
  font-family:'Hiragino Kaku Gothic Pro','ヒラギノ角ゴ Pro',Meiryo,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-wrap{width:100%;max-width:340px;padding:1.5rem}

.login-header{text-align:center;margin-bottom:3rem}
.login-title{font-size:0.7rem;letter-spacing:0.4em;color:#a08060;margin-bottom:0.6rem}
.login-sub{font-size:0.6rem;color:#7a5a40;letter-spacing:0.15em}

.field-group{margin-bottom:1.4rem}
.field-label{
  display:block;
  font-size:0.6rem;
  letter-spacing:0.3em;
  color:#9a7a58;
  margin-bottom:0.5rem;
}
input[type=text],input[type=password]{
  width:100%;
  background:#0a0806;
  border:none;
  border-bottom:1px solid #5a4030;
  color:#c0a888;
  padding:0.7rem 0.2rem;
  font-family:inherit;
  font-size:0.9rem;
  letter-spacing:0.05em;
  outline:none;
  transition:border-color 0.3s;
  border-radius:0;
}
input:focus{border-bottom-color:#7a5a3a}
input:disabled{color:#4a3828;cursor:default}
input.error{border-bottom-color:#7a2818;animation:shake 0.28s}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}

#pw-section{
  opacity:0;
  transform:translateY(8px);
  transition:opacity 0.6s ease,transform 0.6s ease;
  pointer-events:none;
}
#pw-section.visible{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.hint{
  font-size:0.58rem;
  color:#6a5040;
  letter-spacing:0.1em;
  margin-top:0.7rem;
  text-align:right;
}

.btn{
  width:100%;
  background:transparent;
  color:#9a7858;
  border:1px solid #5a4030;
  padding:0.75rem;
  font-family:inherit;
  font-size:0.68rem;
  letter-spacing:0.3em;
  cursor:pointer;
  margin-top:2rem;
  transition:border-color 0.3s,color 0.3s;
}
.btn:hover{border-color:#6a5040;color:#c0a888}

.error-msg{
  font-size:0.62rem;
  color:#7a2818;
  text-align:center;
  margin-top:1.2rem;
  min-height:1.2em;
  letter-spacing:0.1em;
  opacity:0;
  transition:opacity 0.2s;
}
.error-msg.show{opacity:1}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-header">
    <div class="login-title">非公開ページ</div>
    <div class="login-sub">アクセスには認証が必要です</div>
  </div>

  <div class="field-group">
    <label class="field-label" for="username">USERNAME</label>
    <input type="text" id="username" autocomplete="off" spellcheck="false">
  </div>

  <div class="field-group" id="pw-section">
    <label class="field-label" for="password">PASSWORD</label>
    <input type="password" id="password" autocomplete="off">
    <div class="hint">パスワードのヒント：where</div>
  </div>

  <button class="btn" id="btn">— 認証 —</button>
  <div class="error-msg" id="err"></div>
</div>

<script>
const CORRECT_USER = 'kusanagiyuki';
const CORRECT_PASS = 'ooidokouen';

const unEl  = document.getElementById('username');
const pwSec = document.getElementById('pw-section');
const pwEl  = document.getElementById('password');
const btn   = document.getElementById('btn');
const err   = document.getElementById('err');

let userOk = false;

function showError(msg) {
  err.textContent = msg;
  err.classList.add('show');
  setTimeout(() => err.classList.remove('show'), 1800);
}

function checkUser() {
  if (unEl.value.trim() === CORRECT_USER) {
    userOk = true;
    unEl.disabled = true;
    pwSec.classList.add('visible');
    setTimeout(() => pwEl.focus(), 640);
  } else {
    unEl.classList.add('error');
    showError('一致するユーザーが見つかりません');
    setTimeout(() => unEl.classList.remove('error'), 400);
    unEl.value = '';
  }
}

function checkPass() {
  if (pwEl.value.trim() === CORRECT_PASS) {
    window.location.href = 'yuki-log.html';
  } else {
    pwEl.classList.add('error');
    showError('パスワードが正しくありません');
    setTimeout(() => pwEl.classList.remove('error'), 400);
    pwEl.value = '';
  }
}

btn.addEventListener('click', () => {
  if (!userOk) checkUser();
  else checkPass();
});

unEl.addEventListener('keydown', e => { if (e.key === 'Enter') checkUser(); });
pwEl.addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });
</script>
</body>
</html>
