<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記録の終わり</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080604;color:#9a8878;font-family:'Hiragino Mincho Pro','游明朝','Yu Mincho',Georgia,serif;font-size:15px;line-height:2.2;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem}

.wrap{max-width:520px;width:100%;text-align:center;opacity:0;animation:fadein 3s ease 0.5s forwards}

@keyframes fadein{to{opacity:1}}

.label{font-size:0.6rem;letter-spacing:0.5em;color:#3a2a1a;margin-bottom:4rem;font-family:'Hiragino Kaku Gothic Pro',Meiryo,sans-serif}

.message{color:#c0a888;font-size:1rem;line-height:3.2;margin-bottom:5rem}
.message p{margin-bottom:0}

.divider{width:1px;height:3rem;background:linear-gradient(to bottom,transparent,#3a2a1a,transparent);margin:3rem auto}

footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:1rem;font-size:0.55rem;color:#2a1a0a;font-family:'Hiragino Kaku Gothic Pro',Meiryo,sans-serif}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">— 記録の終わり —</div>

  <div class="message">
    <p>あなたはすべての記録を読んだ。</p>
    <p>美香のことを、知った。</p>
    <p>この日記は、誰にも見つけられないはずだった。</p>
    <p>でも、あなたは見つけた。</p>
    <p>最後まで読んでくれて、ありがとう。</p>
  </div>

  <div class="divider"></div>

  <div class="label" style="margin-bottom:0;margin-top:1rem">GAME CLEAR</div>
</div>

<footer>本コンテンツはARG作品のためのフィクションです。登場人物・事件はすべて架空。画像にはAI生成を含みます。</footer>
</body>
</html>
