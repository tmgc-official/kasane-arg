<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゆきちゃんのプロフィール｜プロフィール</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0e8f5;color:#333;font-family:'Hiragino Kaku Gothic Pro',Meiryo,sans-serif;font-size:13px;min-height:100vh}

/* サイトヘッダー */
.site-header{background:linear-gradient(135deg,#c084d8,#a855c8);color:#fff;text-align:center;padding:0.6rem 1rem}
.site-name{font-size:1.1rem;font-weight:bold;letter-spacing:0.2em}
.site-sub{font-size:0.6rem;letter-spacing:0.15em;opacity:0.8;margin-top:0.2rem}

/* プロフィールカード */
.profile-wrap{max-width:520px;margin:1.5rem auto;padding:0 1rem}
.profile-card{background:#fff;border:2px solid #d8a8e8;border-radius:8px;overflow:hidden}

.profile-header{background:linear-gradient(135deg,#e8c0f8,#d4a0e8);padding:1.2rem;text-align:center;border-bottom:1px solid #d8a8e8}
.profile-icon{width:64px;height:64px;border-radius:50%;background:#c084d8;margin:0 auto 0.6rem;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:3px solid #fff}
.profile-nick{font-size:1rem;font-weight:bold;color:#6a1a8a;letter-spacing:0.1em}
.profile-id{font-size:0.6rem;color:#9a6aaa;margin-top:0.2rem;letter-spacing:0.1em}

.profile-table{width:100%;border-collapse:collapse}
.profile-table tr{border-bottom:1px solid #f0e0f8}
.profile-table tr:last-child{border-bottom:none}
.profile-table td{padding:0.6rem 0.9rem;vertical-align:top;line-height:1.8}
.label{background:#f8eeff;color:#8a3aaa;font-size:0.72rem;white-space:nowrap;width:38%;font-weight:bold;letter-spacing:0.05em}
.value{color:#444;font-size:0.82rem}
.value.garbled{color:#bbb;font-family:monospace;letter-spacing:0.05em}

.profile-footer{background:#f8eeff;padding:0.6rem 0.9rem;font-size:0.6rem;color:#aaa;text-align:center;border-top:1px solid #e8d0f8}

/* 前略ナビ */
.zenryaku-nav{background:#a855c8;color:#fff;font-size:0.65rem;padding:0.3rem 0.9rem;display:flex;gap:1rem;flex-wrap:wrap}
.zenryaku-nav span{opacity:0.7;cursor:default}

footer{text-align:center;padding:1.5rem 1rem;font-size:0.58rem;color:#aaa;margin-top:2rem}
</style>
</head>
<body>

<div class="site-header">
  <div class="site-name">プロフィール</div>
  <div class="site-sub">PROFILE</div>
</div>
<div class="zenryaku-nav">
  <span>ホーム</span>
  <span>プロフィール一覧</span>
  <span>メッセージ</span>
</div>

<div class="profile-wrap">
  <div class="profile-card">
    <div class="profile-header">
      <div class="profile-icon">❄</div>
      <div class="profile-nick">ゆきちゃん</div>
    </div>

    <table class="profile-table">
      <tr>
        <td class="label">名前</td>
        <td class="value garbled">▶︎θ↓◉⇔％</td>
      </tr>
      <tr>
        <td class="label">ニックネーム</td>
        <td class="value">ゆきちゃん</td>
      </tr>
      <tr>
        <td class="label">誕生日</td>
        <td class="value">2006年11月28日</td>
      </tr>
      <tr>
        <td class="label">血液型</td>
        <td class="value">AB型</td>
      </tr>
      <tr>
        <td class="label">星座</td>
        <td class="value garbled">＊￥座</td>
      </tr>
      <tr>
        <td class="label">好きな食べ物</td>
        <td class="value garbled">θ◇＆＊×◯</td>
      </tr>
      <tr>
        <td class="label">嫌いな食べ物</td>
        <td class="value garbled">＃◇♂◇</td>
      </tr>
      <tr>
        <td class="label">好きな教科</td>
        <td class="value">数学、現代文</td>
      </tr>
      <tr>
        <td class="label">嫌いな教科</td>
        <td class="value">体育</td>
      </tr>
      <tr>
        <td class="label">好きな季節</td>
        <td class="value garbled">▲⇔</td>
      </tr>
      <tr>
        <td class="label">趣味</td>
        <td class="value">写真、読書</td>
      </tr>
      <tr>
        <td class="label">将来の夢</td>
        <td class="value"><span class="garbled">⬜︎◯％△◯</span>に行くこと</td>
      </tr>
    </table>

    <div class="profile-footer">このプロフィールは本人のみ編集できます</div>
  </div>
</div>

<footer>プロフィール &copy; 2024<br>
<div style="font-size:0.58rem;color:#bbb;margin-top:0.5rem;padding-top:0.4rem;border-top:1px solid rgba(0,0,0,0.08)">本コンテンツはARG作品のためのフィクションです。登場人物・事件はすべて架空。画像にはAI生成を含みます。</div>
</footer>
</body>
</html>
